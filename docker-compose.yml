services:
  app1:
    build: .
    container_name: compose-demo-app1
    environment:
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_NAME: app1
    depends_on:
      - redis

  app2:
    build: .
    container_name: compose-demo-app2
    environment:
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_NAME: app2
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: compose-demo-redis
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:alpine
    container_name: compose-demo-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2

volumes:
  redis_data: